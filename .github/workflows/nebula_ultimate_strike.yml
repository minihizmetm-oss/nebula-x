name: "Nebula-X Orion: 61-Model Ultimate Strike"

on:
  workflow_dispatch:
    inputs:
      target:
        description: '🔍 Hedef Domain'
        required: true
        default: 'testphp.vulnweb.com'

jobs:
  heavy-assault:
    runs-on: ubuntu-latest
    steps:
      - name: 🔱 Depoyu Çek
        uses: actions/checkout@v4

      - name: 🔱 60+1 Siber Modeli GitHub'da Kur (Mühürlü)
        run: |
          export GOPATH=$HOME/go
          export PATH=$PATH:$GOPATH/bin
          
          # PDTM ve Temel Araçlar
          go install github.com/projectdiscovery/pdtm/cmd/pdtm@latest
          pdtm -ia
          
          # Senin verdiğin 60 Yeni Modelden en kritikleri
          go install github.com/lc/gau/v2/cmd/gau@latest
          go install github.com/hahwul/dalfox/v2@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest
          go install github.com/s0md3v/Arjun@latest
          
          echo "🧠 AI Çekirdeği Aktif. Hedef: ${{ github.event.inputs.target }}"

      - name: 🚀 61 Modelli Omni-Strike Başlat
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          subfinder -d ${{ github.event.inputs.target }} -silent | nuclei -as -o results.txt

      - name: 💎 Holografik Hafıza: Sonuçları Mühürle
        run: |
          git config --global user.name "Ahmet"
          git config --global user.email "ahmet@mini.ai"
          git add results.txt
          git commit -m "🔱 Nebula-X Ultimate: 61-Model Raporu" || echo "Hata yok"
          git push
